name: 'Build the Unity Runtime'

on:
  push:
    branches:
      - il2cpp-testing
  workflow_dispatch:

permissions:
  packages: write
  contents: write

jobs:
  build-runtime:
    name: 'Build the Unity Runtime'
    runs-on: windows-latest

    steps:
      - name: 'Checkout composite actions'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            .github

      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: 'true'
          path: 'UnityRuntime'
          submodules: 'false'

      - name: 'Remove UMP Directory'
        working-directory: 'UnityRuntime'
        shell: bash
        run: rm -rf Assets/UniversalMediaPlayer
        
      - name: Install Visual C++ Redistributables
        run: |
          choco install vcredist-all -y

      - name: 'Install Unity'
        uses: buildalon/unity-setup@ce7a36727d19c525883931d4b09b27d4fa92823a # v2.4.0
        id: unity-setup
        with:
          auto-update-hub: 'false' # workaround changed url
          unity-version: '2019.4.19f1'
          modules: |
            windows-il2cpp
          cache-installation: 'true'

      - name: 'Activate Unity license'
        uses: buildalon/activate-unity-license@ed044477f266bebc3b0bc5270ac3b29782e76116 # v2.1.0
        with:
          license: 'personal'
          username: '${{ secrets.UNITY_CI_USERNAME }}'
          password: '${{ secrets.UNITY_CI_PASSWORD }}'

      - name: 'Build Unity Runtime'
        shell: cmd
        run: '"${{ steps.unity-setup.outputs.unity-editor-path }}" -quit -batchmode -nographics -projectPath UnityRuntime/ -buildTarget StandaloneWindows64 -executeMethod AppBuilder.BuildWindowsIL2CPP_Release'
        
      - name: 'Upload built artifact'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: WindowsIL2CPP/
